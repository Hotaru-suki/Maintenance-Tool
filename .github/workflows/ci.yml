name: CI

on:
  push:
  pull_request:

jobs:
  compatibility-tests:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate workflow smoke checks
        shell: pwsh
        run: |
          python scripts/ci/validate_workflows.py

      - name: Run test suite
        id: pytest
        continue-on-error: true
        shell: pwsh
        run: |
          python scripts/ci/cleanup_test_artifacts.py --path artifacts
          New-Item -ItemType Directory -Force -Path artifacts/raw | Out-Null
          pytest -q --junitxml=artifacts/raw/junit.xml

      - name: Build CI artifact bundle
        if: always()
        shell: pwsh
        run: |
          python scripts/ci/collect_test_artifacts.py `
            --output-root artifacts `
            --bundle-name ci-${{ github.run_id }}-py${{ matrix.python-version }} `
            --workflow ci `
            --run-id ${{ github.run_id }} `
            --sha ${{ github.sha }} `
            --ref-name ${{ github.ref_name }} `
            --pytest-status ${{ steps.pytest.outcome }} `
            --python-version ${{ matrix.python-version }} `
            --junit artifacts/raw/junit.xml `
            --note windows-validation

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-${{ github.run_id }}-py${{ matrix.python-version }}
          path: artifacts/ci-${{ github.run_id }}-py${{ matrix.python-version }}.zip

      - name: Cleanup transient artifacts
        if: always()
        shell: pwsh
        run: |
          python scripts/ci/cleanup_test_artifacts.py `
            --path artifacts/raw `
            --path artifacts/ci-${{ github.run_id }}-py${{ matrix.python-version }} `
            --path .pytest_cache

      - name: Fail on pytest errors
        if: steps.pytest.outcome != 'success'
        shell: pwsh
        run: |
          throw "pytest failed"
